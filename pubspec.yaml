name: timed_messenger
description: 愛傳時定時訊息App - 支援多時區、音效震動、分類管理、主題自訂的完整版本
publish_to: 'none'
version: 1.4.0+4

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # ========== UI與基礎功能 ==========
  cupertino_icons: ^1.0.2
  intl: ^0.18.1

  # ========== 本地資料庫 ==========
  sqflite: ^2.3.0
  sqflite_common_ffi: ^2.3.0+4
  path: ^1.8.3

  # ========== 本地通知（僅移動平台）==========
  # flutter_local_notifications: ^17.2.2

  # ========== 時區支援 ==========
  timezone: ^0.9.2

  # ========== 本地儲存（主題設定、用戶偏好）==========
  shared_preferences: ^2.2.2

  # ========== 音效功能 ==========
  # 已改用 Flutter 內建的 SystemSound，無需額外依賴

  # ========== 震動功能 ==========
  vibration: ^3.1.3             # 震動控制庫（升級解決 Android 編譯錯誤）

  # ========== 分享和檔案處理 ==========
  share_plus: ^7.2.1            # 分享功能
  file_picker: ^8.0.0+1         # 檔案選擇器

  # ========== Firebase 相關依賴 ==========
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.0
  google_sign_in: ^6.2.1
  cloud_firestore: ^5.4.0
  firebase_messaging: ^15.1.3        # 推播通知功能

  # ========== 主題功能 ==========
  # 使用Flutter內建的ThemeData和MaterialColor
  # shared_preferences 已在上方列出，用於儲存主題偏好

  # ========== 付費訂閱功能 ==========
  in_app_purchase: ^3.2.0           # 應用內購買功能

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  # ========== 資源檔案設定 ==========
  assets:
    # 時區資料檔案
    - packages/timezone/data/latest_all.tzf
    # 音效已改用 Flutter 內建的 SystemSound，無需音效檔案
    # 主題相關資源（如需要自訂圖示或圖片時使用）
    # - assets/images/
    # - assets/icons/  