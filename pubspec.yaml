name: timed_messenger
description: 愛傳時定時訊息App - 支援多時區、音效震動、分類管理、主題自訂的完整版本
publish_to: 'none'
version: 1.4.0+4
environment:
  sdk: '>=3.0.0 <4.0.0'
dependencies:
  flutter:
    sdk: flutter
  # ========== UI與基礎功能 ==========
  cupertino_icons: ^1.0.2
  intl: ^0.18.1
  # ========== 本地資料庫 ==========
  sqflite: ^2.3.0
  sqflite_common_ffi: ^2.3.0+4
  path: ^1.8.3
  # ========== 本地通知（僅移動平台）==========
  flutter_local_notifications: ^17.2.2
  # ========== 時區支援 ==========
  timezone: ^0.9.2
  # ========== 本地儲存（主題設定、用戶偏好）==========
  shared_preferences: ^2.2.2
  # ========== 震動功能 ==========
  vibration: ^3.1.3
  # ========== 分享和檔案處理 ==========
  share_plus: ^7.2.1
  file_picker: ^8.0.0+1
  # ========== Firebase 相關依賴 ==========
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.0
  google_sign_in: ^6.2.1
  cloud_firestore: ^5.4.0
  firebase_messaging: ^15.1.3
  # ========== 主題功能 ==========
  # ========== 付費訂閱功能 ==========
  in_app_purchase: ^3.2.0
  # ========== 權限管理（背景通知引導）==========
  permission_handler: ^11.0.1
  android_intent_plus: ^4.0.3
  # ========== 語音訊息功能 ==========
  record: ^6.0.0
  audioplayers: ^6.1.0
  firebase_storage: ^12.3.0
  path_provider: ^2.1.5
  # ========== TTS 文字朗讀 ==========
  flutter_tts: ^4.2.0
  # ========== 前景服務（背景語音播放）==========
  flutter_foreground_task: ^8.16.0
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.14.2
  flutter_native_splash: ^2.4.3
flutter:
  uses-material-design: true
  assets:
    - packages/timezone/data/latest_all.tzf
    - assets/icons/

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icons/app_icon.png"
  min_sdk_android: 21
  adaptive_icon_background: "#7B2FBE"
  adaptive_icon_foreground: "assets/icons/app_icon.png"

flutter_native_splash:
  color: "#7B2FBE"
  image: assets/icons/splash_icon.png
  android: true
  ios: false
  android_12:
    color: "#7B2FBE"
    image: assets/icons/splash_icon.png

  